name: Build and Release APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.1'
          channel: 'stable'
          cache: true

      - name: Inject google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr '+' '-')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PlusSound-APK-${{ steps.version.outputs.VERSION }}
          path: build/app/outputs/flutter-apk/app-*-release.apk

      - name: Delete old 'latest' release
        if: github.ref == 'refs/heads/main'
        run: |
          gh release delete latest --yes || true
          git push --delete origin latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-*-release.apk
          name: "PlusSound v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          body: |
            ## 🎵 PlusSound v${{ steps.version.outputs.VERSION }}

            ### ✨ Yang Baru di Update Ini (v1.0.9 Mega Update):
            - 🎵 **Lirik Ala Spotify**: Lirik sinkron bisa di-scroll & tab tampilan penuh.
            - 📁 **Fitur Playlist**: Buat, simpan, & kelola lagu di playlist lokal.
            - 🎨 **Gaya Beranda**: Pilih dari 3 gaya (Default, Kompak, Grid).
            - 🖌️ **Tema Player**: Tampilan Gradien, Solid, atau Vibrant (Warna Aksen).
            - 🚀 **Lebih Ringan & Cepat**: Perbaikan lag saat putar lagu (auto-play fixed).
            - 🐛 **Bug Fixes**: Warna aksen bisa diganti, install APK dari app, tombol Next/Prev stabil.
            - 📱 **Mode Terang**: Perbaikan teks mode terang di seluruh UI.

            ### 📱 Pilih APK Sesuai HP:
            | File | Untuk HP |
            |------|----------|
            | `app-arm64-v8a-release.apk` | HP 64-bit (2017+) |
            | `app-armeabi-v7a-release.apk` | HP 32-bit (lama) |
            | `app-x86_64-release.apk` | Emulator |

            > ⚠️ Jika ragu, download `app-arm64-v8a-release.apk`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
